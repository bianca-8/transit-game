<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transit Game</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="top-bar">
    <a id="back" href="city-select.html">← Back</a>
    <div id="top-right">
      <span id="timer" hidden></span>
      <button id="map" aria-label="Open map" hidden>
        Map
      </button>
    </div>
  </div>
  <div class="city-page">
    <img class="icon" src="assets/que.png" alt="Quebec City" />
    <h2>Quebec City</h2>
    <p>Game!</p>
  </div>
  <div id="map-overlay" role="dialog" aria-modal="true" aria-label="Map">
    <div id="map-popup">
      <div id="map-header">
        <button id="close">✕</button>
      </div>
      <div id="map-content"></div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="city.js"></script>
</body>
</html>
